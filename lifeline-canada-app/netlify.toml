[build]
  command = "npm install && tsc --noEmit || true && vite build"
  publish = "dist"

[build.environment]
  CI = "false"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NODE_ENV = "production"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200